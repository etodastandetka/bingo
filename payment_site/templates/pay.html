<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <title>Оплата - Bingo KG</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: var(--tg-theme-bg-color, linear-gradient(135deg, #0a1a2e 0%, #16213e 25%, #1a237e 50%, #0d47a1 75%, #1565c0 100%));
            color: var(--tg-theme-text-color, #ffffff);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            margin: 0;
        }
        
        .container {
            background: var(--tg-theme-secondary-bg-color, rgba(15, 30, 60, 0.95));
            border-radius: 24px;
            padding: 32px;
            max-width: 480px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .header {
            text-align: center;
            margin-bottom: 24px;
        }
        
        .header h1 {
            color: var(--tg-theme-text-color, #ffffff);
            font-size: 24px;
            font-weight: 600;
            margin-bottom: 12px;
        }
        
        .amount {
            font-size: 32px;
            font-weight: 700;
            color: var(--tg-theme-button-color, #64b5f6);
            margin: 16px 0;
            text-shadow: 0 2px 10px rgba(100, 181, 246, 0.5);
        }
        
        .timer {
            text-align: center;
            margin: 16px 0;
            font-size: 20px;
            color: #e74c3c;
            font-weight: 600;
        }
        
        .block {
            background: var(--tg-theme-bg-color, rgba(26, 35, 126, 0.3));
            border-radius: 16px;
            padding: 20px;
            margin: 20px 0;
            border: 1px solid rgba(100, 181, 246, 0.2);
            backdrop-filter: blur(5px);
        }
        
        .block-title {
            font-size: 14px;
            font-weight: 600;
            color: var(--tg-theme-hint-color, #90caf9);
            margin-bottom: 12px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        .qr-container {
            text-align: center;
        }
        
        .qr-code {
            max-width: 220px;
            width: 100%;
            margin: 0 auto;
            background: white;
            padding: 16px;
            border-radius: 12px;
        }
        
        .qr-code img {
            width: 100%;
            height: auto;
            display: block;
        }
        
        .bank-buttons {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
        }
        
        .bank-button {
            padding: 16px 12px;
            border: 2px solid var(--tg-theme-hint-color, rgba(100, 181, 246, 0.3));
            border-radius: 16px;
            background: var(--tg-theme-secondary-bg-color, rgba(15, 30, 60, 0.6));
            cursor: pointer;
            transition: all 0.3s ease;
            text-align: center;
            text-decoration: none;
            color: var(--tg-theme-text-color, #ffffff);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 8px;
            font-size: 14px;
            font-weight: 600;
            backdrop-filter: blur(5px);
            min-height: 60px;
        }
        
        .bank-button:hover {
            border-color: var(--tg-theme-button-color, #64b5f6);
            background: var(--tg-theme-bg-color, rgba(26, 35, 126, 0.5));
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(100, 181, 246, 0.4);
        }
        
        .bank-button.active {
            border-color: var(--tg-theme-button-color, #64b5f6);
            background: linear-gradient(135deg, #1976d2 0%, #1565c0 100%);
            color: var(--tg-theme-button-text-color, white);
            box-shadow: 0 6px 25px rgba(100, 181, 246, 0.6);
        }
        
        .warning {
            background: var(--tg-theme-secondary-bg-color, #fff3cd);
            border: 1px solid #ffc107;
            border-radius: 12px;
            padding: 12px;
            margin: 16px 0;
            color: var(--tg-theme-hint-color, #856404);
            font-size: 13px;
        }
        
        .receipt-upload {
            margin-top: 20px;
        }
        
        .upload-area {
            border: 2px dashed var(--tg-theme-hint-color, rgba(100, 181, 246, 0.4));
            border-radius: 12px;
            padding: 24px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            background: var(--tg-theme-secondary-bg-color, rgba(15, 30, 60, 0.4));
            backdrop-filter: blur(5px);
        }
        
        .upload-area:hover {
            border-color: var(--tg-theme-button-color, #64b5f6);
            background: var(--tg-theme-bg-color, rgba(26, 35, 126, 0.5));
            box-shadow: 0 4px 15px rgba(100, 181, 246, 0.2);
        }
        
        .upload-area.dragover {
            border-color: var(--tg-theme-button-color, #64b5f6);
            background: var(--tg-theme-bg-color, rgba(26, 35, 126, 0.6));
            box-shadow: 0 4px 20px rgba(100, 181, 246, 0.4);
        }
        
        .upload-icon {
            font-size: 32px;
            margin-bottom: 8px;
        }
        
        .upload-text {
            font-size: 14px;
            color: var(--tg-theme-text-color, #666);
            margin-bottom: 4px;
        }
        
        .upload-hint {
            font-size: 12px;
            color: var(--tg-theme-hint-color, #999);
        }
        
        .receipt-preview {
            margin-top: 12px;
            display: none;
        }
        
        .receipt-preview img {
            max-width: 100%;
            max-height: 200px;
            border-radius: 12px;
            border: 2px solid rgba(100, 181, 246, 0.3);
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
        }
        
        .receipt-preview.show {
            display: block;
        }
        
        .remove-receipt {
            margin-top: 8px;
            padding: 6px 12px;
            background: #e74c3c;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 12px;
        }
        
        .loading {
            text-align: center;
            padding: 20px;
            color: var(--tg-theme-hint-color, #666);
        }
        
        .button {
            background: linear-gradient(135deg, #4CAF50 0%, #45a049 100%);
            color: white;
            border: none;
            border-radius: 16px;
            padding: 16px 32px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            width: 100%;
            margin-top: 20px;
            box-shadow: 0 4px 15px rgba(76, 175, 80, 0.3);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        .button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(76, 175, 80, 0.4);
        }
        
        .button:active {
            transform: translateY(0);
        }
        
        .button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }
        
        .button.loading {
            position: relative;
            color: transparent;
        }
        
        .button.loading::after {
            content: '';
            position: absolute;
            width: 20px;
            height: 20px;
            top: 50%;
            left: 50%;
            margin-left: -10px;
            margin-top: -10px;
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 0.8s linear infinite;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        @media (max-width: 480px) {
            .container {
                padding: 24px;
            }
            
            .amount {
                font-size: 28px;
            }
            
            .bank-buttons {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>💰 Оплата</h1>
            <div class="amount" id="amount">{{ amount }} KGS</div>
            <div class="timer" id="timer">05:00</div>
        </div>
        
        <div class="block">
            <div class="block-title">QR код для оплаты</div>
            <div class="qr-container" id="qrContainer">
                <div class="loading">Загрузка QR кода...</div>
            </div>
        </div>
        
        <div class="block">
            <div class="block-title">Выберите банк</div>
            <div class="bank-buttons" id="bankButtons">
                <!-- Банки будут добавлены через JS -->
            </div>
        </div>
        
        <div class="block receipt-upload">
            <div class="block-title">Фото чека (необязательно)</div>
            <div class="upload-area" id="uploadArea">
                <div class="upload-icon">📷</div>
                <div class="upload-text">Нажмите или перетащите фото</div>
                <div class="upload-hint">JPG, PNG до 5MB</div>
            </div>
            <input type="file" id="fileInput" accept="image/*" style="display: none;">
            <div class="receipt-preview" id="receiptPreview">
                <img id="receiptImage" src="" alt="Чек">
                <button class="remove-receipt" onclick="removeReceipt()">Удалить</button>
            </div>
        </div>
        
        <button class="button" id="paidButton" onclick="submitPayment()">
            ✅ Я оплатил
        </button>
    </div>
    
    <script>
        // Инициализация Telegram WebApp
        let tg = window.Telegram?.WebApp;
        
        // Проверка, открыто ли приложение в Telegram
        if (!tg || !tg.initDataUnsafe?.user) {
            // Если открыто не в Telegram, показываем предупреждение
            document.body.innerHTML = `
                <div style="
                    background: var(--tg-theme-bg-color, #ffffff);
                    color: var(--tg-theme-text-color, #000000);
                    padding: 40px 20px;
                    height: 100vh;
                    width: 100vw;
                    display: flex;
                    flex-direction: column;
                    align-items: center;
                    justify-content: center;
                    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
                    text-align: center;
                ">
                    <img src="https://telegram.org/img/t_logo.png" alt="Telegram" style="width: 120px; height: 120px; margin-bottom: 20px;">
                    <p style="font-size: 18px; margin: 8px 0;"><strong>Упс!</strong></p>
                    <p style="font-size: 18px; margin: 8px 0;">Это приложение должно быть запущено <strong>внутри Telegram!</strong></p>
                </div>
            `;
        } else {
            // Если открыто в Telegram, инициализируем приложение
            tg.expand(); // Расширяем на все окно
            tg.ready(); // Говорим Telegram, что приложение готово
        }
        
        // Получаем ID пользователя из Telegram WebApp
        function getUserId() {
            // Основной способ: initDataUnsafe.user.id
            if (tg?.initDataUnsafe?.user?.id) {
                const userId = tg.initDataUnsafe.user.id.toString();
                console.log('✅ Got user ID from initDataUnsafe.user.id:', userId);
                return userId;
            }
            
            // Fallback: пытаемся получить из URL параметров (если передано)
            const urlParams = new URLSearchParams(window.location.search);
            const userIdFromUrl = urlParams.get('user_id');
            if (userIdFromUrl) {
                console.log('✅ Got user ID from URL parameter:', userIdFromUrl);
                return userIdFromUrl;
            }
            
            console.warn('⚠️ Could not get user ID from Telegram WebApp');
            return null;
        }
        
        // Глобальные переменные
        let amount, requestId, expiresAt, telegramUserId, bankUrls, selectedBank, receiptFile;
        
        // Инициализация данных (всегда, независимо от Telegram)
        amount = parseFloat('{{ amount }}') || 0;
        requestId = '{{ request_id }}' || '';
        expiresAt = parseInt('{{ expires_timestamp }}') || (Date.now() + 300000);
        telegramUserId = getUserId();
        bankUrls = {};
        selectedBank = 'omoney';
        receiptFile = null;
        
        // Банки (глобальная переменная)
        const banks = [
            { id: 'omoney', name: 'O!Money' },
            { id: 'mbank', name: 'MBank' },
            { id: 'bakai', name: 'Bakai' },
            { id: 'demirbank', name: 'DemirBank' },
            { id: 'balance', name: 'Balance.kg' },
            { id: 'megapay', name: 'MegaPay' }
        ];
        
        console.log('📊 Payment Form Data:', {
            telegramUserId: telegramUserId,
            requestId: requestId,
            amount: amount,
            expiresAt: expiresAt,
            tgAvailable: !!tg,
            userAvailable: !!tg?.initDataUnsafe?.user
        });
        
        // Таймер обратного отсчета (глобальная функция)
        function updateTimer() {
            const now = Date.now();
            const remaining = expiresAt - now;
            
            if (remaining <= 0) {
                const timerEl = document.getElementById('timer');
                if (timerEl) {
                    timerEl.textContent = '00:00';
                    timerEl.style.color = '#e74c3c';
                }
                return;
            }
            
            const minutes = Math.floor(remaining / 60000);
            const seconds = Math.floor((remaining % 60000) / 1000);
            
            const timerEl = document.getElementById('timer');
            if (timerEl) {
                timerEl.textContent = 
                    `${String(minutes).padStart(2, '0')}:${String(seconds).padStart(2, '0')}`;
            }
        }
        
        // Запускаем таймер
        setInterval(updateTimer, 1000);
        updateTimer();
        
        // Генерация QR кода (глобальная функция)
        async function loadQR() {
            try {
                // Прямой запрос к API админки
                const response = await fetch('https://fqxgmrzplndwsyvkeu.ru/api/public/generate-qr', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        amount: amount,
                        bank: 'omoney' // По умолчанию O!Money
                    })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    bankUrls = data.all_bank_urls || {};
                    
                    // Берем ссылку O!Money из all_bank_urls
                    const omoneyUrl = bankUrls['omoney'] || bankUrls['O!Money'] || data.primary_url;
                    
                    if (omoneyUrl) {
                        // Генерируем QR код из ссылки O!Money
                        generateQRImage(omoneyUrl);
                    } else {
                        document.getElementById('qrContainer').innerHTML = 
                            `<div class="loading" style="color: #e74c3c;">Ошибка: Ссылка O!Money не найдена</div>`;
                    }
                    
                    // Настраиваем кнопки банков
                    setupBankButtons();
                } else {
                    document.getElementById('qrContainer').innerHTML = 
                        `<div class="loading" style="color: #e74c3c;">Ошибка: ${data.error}</div>`;
                }
            } catch (error) {
                console.error('Error loading QR:', error);
                document.getElementById('qrContainer').innerHTML = 
                    `<div class="loading" style="color: #e74c3c;">Ошибка загрузки QR кода</div>`;
            }
        }
        
        // Генерация QR изображения из ссылки (глобальная функция)
        function generateQRImage(url) {
            const qrContainer = document.getElementById('qrContainer');
            if (!qrContainer) return;
            
            qrContainer.innerHTML = `
                <div class="qr-code">
                    <img src="https://api.qrserver.com/v1/create-qr-code/?size=220x220&data=${encodeURIComponent(url)}" alt="QR Code">
                </div>
                <p style="margin-top: 12px; color: #666; font-size: 13px;">Отсканируйте QR код для оплаты</p>
            `;
        }
        
        // Настройка кнопок банков (глобальная функция)
        function setupBankButtons() {
            const bankButtonsContainer = document.getElementById('bankButtons');
            if (!bankButtonsContainer) {
                console.warn('bankButtons container not found');
                return;
            }
            
            bankButtonsContainer.innerHTML = '';
            
            banks.forEach(bank => {
                const bankUrl = bankUrls[bank.id] || bankUrls[bank.name];
                const button = document.createElement('a');
                button.href = bankUrl || '#';
                button.target = '_blank';
                button.className = 'bank-button';
                if (bank.id === selectedBank) {
                    button.classList.add('active');
                }
                button.textContent = bank.name;
                
                if (bankUrl) {
                    button.onclick = (e) => {
                        e.preventDefault();
                        selectedBank = bank.id;
                        // Обновляем активную кнопку
                        document.querySelectorAll('.bank-button').forEach(btn => {
                            btn.classList.remove('active');
                        });
                        button.classList.add('active');
                        // Открываем ссылку
                        window.open(bankUrl, '_blank');
                    };
                } else {
                    // Если URL еще не загружен, делаем кнопку неактивной
                    button.style.opacity = '0.5';
                    button.style.cursor = 'wait';
                    button.onclick = (e) => {
                        e.preventDefault();
                    };
                }
                
                bankButtonsContainer.appendChild(button);
            });
        }
        
        // Инициализация загрузки фото чека (глобальная функция)
        function initReceiptUpload() {
            const uploadArea = document.getElementById('uploadArea');
            const fileInput = document.getElementById('fileInput');
            const receiptPreview = document.getElementById('receiptPreview');
            const receiptImage = document.getElementById('receiptImage');
            
            if (!uploadArea || !fileInput) return;
            
            uploadArea.addEventListener('click', () => fileInput.click());
            
            uploadArea.addEventListener('dragover', (e) => {
                e.preventDefault();
                uploadArea.classList.add('dragover');
            });
            
            uploadArea.addEventListener('dragleave', () => {
                uploadArea.classList.remove('dragover');
            });
            
            uploadArea.addEventListener('drop', (e) => {
                e.preventDefault();
                uploadArea.classList.remove('dragover');
                const files = e.dataTransfer.files;
                if (files.length > 0) {
                    handleFile(files[0]);
                }
            });
            
            fileInput.addEventListener('change', (e) => {
                if (e.target.files.length > 0) {
                    handleFile(e.target.files[0]);
                }
            });
        }
        
        // Обработка файла (глобальная функция)
        function handleFile(file) {
            if (!file.type.startsWith('image/')) {
                if (tg) {
                    tg.showPopup({
                        title: 'Ошибка',
                        message: 'Пожалуйста, выберите изображение',
                        buttons: [{ type: 'ok' }]
                    });
                } else {
                    alert('Пожалуйста, выберите изображение');
                }
                return;
            }
            
            if (file.size > 5 * 1024 * 1024) {
                if (tg) {
                    tg.showPopup({
                        title: 'Ошибка',
                        message: 'Файл слишком большой. Максимум 5MB',
                        buttons: [{ type: 'ok' }]
                    });
                } else {
                    alert('Файл слишком большой. Максимум 5MB');
                }
                return;
            }
            
            receiptFile = file;
            const reader = new FileReader();
            reader.onload = (e) => {
                receiptImage.src = e.target.result;
                receiptPreview.classList.add('show');
            };
            reader.readAsDataURL(file);
        }
        
        // Удаление чека (глобальная функция)
        window.removeReceipt = function() {
            receiptFile = null;
            const receiptImage = document.getElementById('receiptImage');
            const receiptPreview = document.getElementById('receiptPreview');
            const fileInput = document.getElementById('fileInput');
            
            if (receiptImage) receiptImage.src = '';
            if (receiptPreview) receiptPreview.classList.remove('show');
            if (fileInput) fileInput.value = '';
        };
        
        // Отправка заявки с чеком при нажатии "Я оплатил" (глобальная функция)
        window.submitPayment = async function() {
            // Проверяем, что открыто в Telegram
            if (!tg || !tg.initDataUnsafe?.user) {
                if (tg) {
                    tg.showPopup({
                        title: 'Ошибка',
                        message: 'Приложение должно быть открыто в Telegram',
                        buttons: [{ type: 'ok' }]
                    });
                } else {
                    alert('Приложение должно быть открыто в Telegram');
                }
                return;
            }
            
            const paidButton = document.getElementById('paidButton');
            
            if (!requestId) {
                if (tg) {
                    tg.showPopup({
                        title: 'Ошибка',
                        message: 'ID заявки не найден',
                        buttons: [{ type: 'ok' }]
                    });
                } else {
                    alert('ID заявки не найден');
                }
                return;
            }
            
            // Блокируем кнопку
            paidButton.disabled = true;
            paidButton.classList.add('loading');
            
            try {
                let receiptBase64 = null;
                
                // Если есть фото чека, конвертируем в base64
                if (receiptFile) {
                    const reader = new FileReader();
                    receiptBase64 = await new Promise((resolve, reject) => {
                        reader.onload = (e) => {
                            const base64 = e.target.result.split(',')[1];
                            resolve(base64);
                        };
                        reader.onerror = reject;
                        reader.readAsDataURL(receiptFile);
                    });
                }
                
                // Подготавливаем данные для отправки
                const updateData = {
                    id: parseInt(requestId)
                };
                
                // Добавляем фото чека если есть
                if (receiptBase64) {
                    updateData.receipt_photo = receiptBase64;
                }
                
                // Добавляем telegram_user_id если доступен (для валидации)
                if (telegramUserId) {
                    updateData.telegram_user_id = telegramUserId;
                }
                
                console.log('📤 Sending payment update:', {
                    id: updateData.id,
                    has_receipt: !!updateData.receipt_photo,
                    telegram_user_id: updateData.telegram_user_id
                });
                
                // Отправляем PUT запрос с чеком
                const response = await fetch('https://fqxgmrzplndwsyvkeu.ru/api/payment', {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify(updateData)
                });
                
                const data = await response.json();
                
                if (data.success) {
                    // Показываем успешное сообщение
                    if (tg) {
                        tg.showPopup({
                            title: '✅ Успешно',
                            message: 'Заявка отправлена! Ожидайте подтверждения.',
                            buttons: [{ 
                                type: 'ok',
                                text: 'ОК'
                            }]
                        });
                        
                        // Закрываем WebApp и возвращаем в бота
                        setTimeout(() => {
                            tg.close();
                        }, 1500);
                    } else {
                        alert('✅ Заявка отправлена! Ожидайте подтверждения.');
                    }
                } else {
                    throw new Error(data.error || 'Не удалось отправить заявку');
                }
            } catch (error) {
                console.error('Error submitting payment:', error);
                
                // Разблокируем кнопку
                paidButton.disabled = false;
                paidButton.classList.remove('loading');
                
                if (tg) {
                    tg.showPopup({
                        title: 'Ошибка',
                        message: error.message || 'Не удалось отправить заявку. Попробуйте еще раз.',
                        buttons: [{ type: 'ok' }]
                    });
                } else {
                    alert('Ошибка: ' + (error.message || 'Не удалось отправить заявку'));
                }
            }
        };
        
        // Инициализация при загрузке страницы
        if (tg && tg.initDataUnsafe?.user) {
            console.log('✅ Telegram WebApp initialized');
        } else {
            console.warn('⚠️ Not in Telegram WebApp, but continuing anyway');
        }
        
        // Инициализируем все компоненты (всегда, независимо от Telegram)
        initReceiptUpload();
        setupBankButtons(); // Показываем банки сразу
        loadQR(); // Загружаем QR код
    </script>
</body>
</html>
