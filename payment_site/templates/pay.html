<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <title>Оплата - Bingo KG</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: var(--tg-theme-bg-color, linear-gradient(135deg, #0a1a2e 0%, #16213e 25%, #1a237e 50%, #0d47a1 75%, #1565c0 100%));
            color: var(--tg-theme-text-color, #ffffff);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            margin: 0;
        }
        
        .container {
            background: var(--tg-theme-secondary-bg-color, rgba(15, 30, 60, 0.95));
            border-radius: 24px;
            padding: 32px;
            max-width: 480px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .header {
            text-align: center;
            margin-bottom: 24px;
        }
        
        .header h1 {
            color: var(--tg-theme-text-color, #ffffff);
            font-size: 24px;
            font-weight: 600;
            margin-bottom: 12px;
        }
        
        .amount {
            font-size: 32px;
            font-weight: 700;
            color: var(--tg-theme-button-color, #64b5f6);
            margin: 16px 0;
            text-shadow: 0 2px 10px rgba(100, 181, 246, 0.5);
        }
        
        .timer {
            text-align: center;
            margin: 16px 0;
            font-size: 20px;
            color: #e74c3c;
            font-weight: 600;
        }
        
        .block {
            background: var(--tg-theme-bg-color, rgba(26, 35, 126, 0.3));
            border-radius: 16px;
            padding: 20px;
            margin: 20px 0;
            border: 1px solid rgba(100, 181, 246, 0.2);
            backdrop-filter: blur(5px);
        }
        
        .block-title {
            font-size: 14px;
            font-weight: 600;
            color: var(--tg-theme-hint-color, #90caf9);
            margin-bottom: 12px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        .qr-container {
            text-align: center;
        }
        
        .qr-code {
            max-width: 220px;
            width: 100%;
            margin: 0 auto;
            background: white;
            padding: 16px;
            border-radius: 12px;
        }
        
        .qr-code img {
            width: 100%;
            height: auto;
            display: block;
        }
        
        .bank-buttons {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 8px;
        }
        
        .bank-button {
            padding: 12px;
            border: 2px solid var(--tg-theme-hint-color, rgba(100, 181, 246, 0.3));
            border-radius: 12px;
            background: var(--tg-theme-secondary-bg-color, rgba(15, 30, 60, 0.6));
            cursor: pointer;
            transition: all 0.3s;
            text-align: center;
            text-decoration: none;
            color: var(--tg-theme-text-color, #ffffff);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
            font-size: 13px;
            font-weight: 500;
            backdrop-filter: blur(5px);
        }
        
        .bank-button:hover {
            border-color: var(--tg-theme-button-color, #64b5f6);
            background: var(--tg-theme-bg-color, rgba(26, 35, 126, 0.5));
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(100, 181, 246, 0.3);
        }
        
        .bank-button.active {
            border-color: var(--tg-theme-button-color, #64b5f6);
            background: linear-gradient(135deg, #1976d2 0%, #1565c0 100%);
            color: var(--tg-theme-button-text-color, white);
            box-shadow: 0 4px 20px rgba(100, 181, 246, 0.5);
        }
        
        .warning {
            background: var(--tg-theme-secondary-bg-color, #fff3cd);
            border: 1px solid #ffc107;
            border-radius: 12px;
            padding: 12px;
            margin: 16px 0;
            color: var(--tg-theme-hint-color, #856404);
            font-size: 13px;
        }
        
        .receipt-upload {
            margin-top: 20px;
        }
        
        .upload-area {
            border: 2px dashed var(--tg-theme-hint-color, rgba(100, 181, 246, 0.4));
            border-radius: 12px;
            padding: 24px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            background: var(--tg-theme-secondary-bg-color, rgba(15, 30, 60, 0.4));
            backdrop-filter: blur(5px);
        }
        
        .upload-area:hover {
            border-color: var(--tg-theme-button-color, #64b5f6);
            background: var(--tg-theme-bg-color, rgba(26, 35, 126, 0.5));
            box-shadow: 0 4px 15px rgba(100, 181, 246, 0.2);
        }
        
        .upload-area.dragover {
            border-color: var(--tg-theme-button-color, #64b5f6);
            background: var(--tg-theme-bg-color, rgba(26, 35, 126, 0.6));
            box-shadow: 0 4px 20px rgba(100, 181, 246, 0.4);
        }
        
        .upload-icon {
            font-size: 32px;
            margin-bottom: 8px;
        }
        
        .upload-text {
            font-size: 14px;
            color: var(--tg-theme-text-color, #666);
            margin-bottom: 4px;
        }
        
        .upload-hint {
            font-size: 12px;
            color: var(--tg-theme-hint-color, #999);
        }
        
        .receipt-preview {
            margin-top: 12px;
            display: none;
        }
        
        .receipt-preview img {
            max-width: 100%;
            max-height: 200px;
            border-radius: 8px;
            border: 2px solid #e0e0e0;
        }
        
        .receipt-preview.show {
            display: block;
        }
        
        .remove-receipt {
            margin-top: 8px;
            padding: 6px 12px;
            background: #e74c3c;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 12px;
        }
        
        .loading {
            text-align: center;
            padding: 20px;
            color: var(--tg-theme-hint-color, #666);
        }
        
        .button {
            background: var(--tg-theme-button-color, #667eea);
            color: var(--tg-theme-button-text-color, white);
            border: none;
            border-radius: 12px;
            padding: 12px 24px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .button:hover {
            opacity: 0.9;
        }
        
        .button:active {
            transform: scale(0.98);
        }
        
        @media (max-width: 480px) {
            .container {
                padding: 24px;
            }
            
            .amount {
                font-size: 28px;
            }
            
            .bank-buttons {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>💰 Оплата</h1>
            <div class="amount" id="amount">{{ amount }} KGS</div>
            <div class="timer" id="timer">05:00</div>
        </div>
        
        <div class="warning">
            ⚠️ Проверьте ваш ID еще раз
        </div>
        
        <div class="block">
            <div class="block-title">QR код для оплаты</div>
            <div class="qr-container" id="qrContainer">
                <div class="loading">Загрузка QR кода...</div>
            </div>
        </div>
        
        <div class="block">
            <div class="block-title">Выберите банк</div>
            <div class="bank-buttons" id="bankButtons">
                <!-- Банки будут добавлены через JS -->
            </div>
        </div>
        
        <div class="block receipt-upload">
            <div class="block-title">Фото чека (необязательно)</div>
            <div class="upload-area" id="uploadArea">
                <div class="upload-icon">📷</div>
                <div class="upload-text">Нажмите или перетащите фото</div>
                <div class="upload-hint">JPG, PNG до 5MB</div>
            </div>
            <input type="file" id="fileInput" accept="image/*" style="display: none;">
            <div class="receipt-preview" id="receiptPreview">
                <img id="receiptImage" src="" alt="Чек">
                <button class="remove-receipt" onclick="removeReceipt()">Удалить</button>
            </div>
        </div>
    </div>
    
    <script>
        // Инициализация Telegram WebApp
        let tg = window.Telegram?.WebApp;
        if (tg) {
            tg.expand(); // Расширяем на все окно
            tg.ready(); // Говорим Telegram, что приложение готово
        }
        
        // Получаем ID пользователя из Telegram WebApp или из URL
        function getUserId() {
            if (tg?.initDataUnsafe?.user?.id) {
                return tg.initDataUnsafe.user.id.toString();
            }
            // Если не в Telegram, пытаемся получить из URL параметров
            const urlParams = new URLSearchParams(window.location.search);
            return urlParams.get('user_id') || null;
        }
        
        const amount = parseFloat('{{ amount }}');
        const requestId = '{{ request_id }}';
        const expiresAt = parseInt('{{ expires_timestamp }}');
        const telegramUserId = getUserId();
        let qrHash = '';
        let bankUrls = {};
        let selectedBank = 'omoney'; // По умолчанию O!Money
        let receiptFile = null;
        
        console.log('Telegram User ID:', telegramUserId);
        console.log('Request ID:', requestId);
        
        // Банки
        const banks = [
            { id: 'omoney', name: 'O!Money' },
            { id: 'mbank', name: 'MBank' },
            { id: 'bakai', name: 'Bakai' },
            { id: 'demirbank', name: 'DemirBank' },
            { id: 'balance', name: 'Balance.kg' },
            { id: 'megapay', name: 'MegaPay' }
        ];
        
        // Таймер обратного отсчета
        function updateTimer() {
            const now = Date.now();
            const remaining = expiresAt - now;
            
            if (remaining <= 0) {
                document.getElementById('timer').textContent = '00:00';
                document.getElementById('timer').style.color = '#e74c3c';
                return;
            }
            
            const minutes = Math.floor(remaining / 60000);
            const seconds = Math.floor((remaining % 60000) / 1000);
            
            document.getElementById('timer').textContent = 
                `${String(minutes).padStart(2, '0')}:${String(seconds).padStart(2, '0')}`;
        }
        
        setInterval(updateTimer, 1000);
        updateTimer();
        
        // Генерация QR кода (один раз, не меняется при смене банка)
        async function loadQR() {
            try {
                // Используем локальный API сайта оплаты, который проксирует запрос к API серверу
                const response = await fetch('/api/generate-qr', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        amount: amount,
                        bank: 'omoney' // По умолчанию O!Money
                    })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    qrHash = data.qr_hash;
                    bankUrls = data.all_bank_urls || {};
                    
                    // Генерируем QR изображение локально
                    generateQRImage(qrHash);
                    
                    // Настраиваем кнопки банков
                    setupBankButtons();
                } else {
                    document.getElementById('qrContainer').innerHTML = 
                        `<div class="loading" style="color: #e74c3c;">Ошибка: ${data.error}</div>`;
                }
            } catch (error) {
                console.error('Error loading QR:', error);
                document.getElementById('qrContainer').innerHTML = 
                    `<div class="loading" style="color: #e74c3c;">Ошибка загрузки QR кода</div>`;
            }
        }
        
        // Генерация QR изображения
        function generateQRImage(hash) {
            // Используем библиотеку qrcode.js или API для генерации изображения
            const qrContainer = document.getElementById('qrContainer');
            qrContainer.innerHTML = `
                <div class="qr-code">
                    <img src="https://api.qrserver.com/v1/create-qr-code/?size=220x220&data=${encodeURIComponent(hash)}" alt="QR Code">
                </div>
                <p style="margin-top: 12px; color: #666; font-size: 13px;">Отсканируйте QR код для оплаты</p>
            `;
        }
        
        // Настройка кнопок банков
        function setupBankButtons() {
            const bankButtonsContainer = document.getElementById('bankButtons');
            bankButtonsContainer.innerHTML = '';
            
            banks.forEach(bank => {
                const bankUrl = bankUrls[bank.id] || bankUrls[bank.name];
                const button = document.createElement('a');
                button.href = bankUrl || '#';
                button.target = '_blank';
                button.className = 'bank-button';
                if (bank.id === selectedBank) {
                    button.classList.add('active');
                }
                button.textContent = bank.name;
                
                if (bankUrl) {
                    button.onclick = (e) => {
                        e.preventDefault();
                        selectedBank = bank.id;
                        // Обновляем активную кнопку
                        document.querySelectorAll('.bank-button').forEach(btn => {
                            btn.classList.remove('active');
                        });
                        button.classList.add('active');
                        // Открываем ссылку
                        window.open(bankUrl, '_blank');
                    };
                } else {
                    // Если URL еще не загружен, делаем кнопку неактивной
                    button.style.opacity = '0.5';
                    button.style.cursor = 'wait';
                    button.onclick = (e) => {
                        e.preventDefault();
                    };
                }
                
                bankButtonsContainer.appendChild(button);
            });
        }
        
        // Показываем банки сразу, даже если QR еще не загрузился
        setupBankButtons();
        
        // Загрузка фото чека
        const uploadArea = document.getElementById('uploadArea');
        const fileInput = document.getElementById('fileInput');
        const receiptPreview = document.getElementById('receiptPreview');
        const receiptImage = document.getElementById('receiptImage');
        
        uploadArea.addEventListener('click', () => fileInput.click());
        
        uploadArea.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadArea.classList.add('dragover');
        });
        
        uploadArea.addEventListener('dragleave', () => {
            uploadArea.classList.remove('dragover');
        });
        
        uploadArea.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadArea.classList.remove('dragover');
            const files = e.dataTransfer.files;
            if (files.length > 0) {
                handleFile(files[0]);
            }
        });
        
        fileInput.addEventListener('change', (e) => {
            if (e.target.files.length > 0) {
                handleFile(e.target.files[0]);
            }
        });
        
        function handleFile(file) {
            if (!file.type.startsWith('image/')) {
                alert('Пожалуйста, выберите изображение');
                return;
            }
            
            if (file.size > 5 * 1024 * 1024) {
                alert('Файл слишком большой. Максимум 5MB');
                return;
            }
            
            receiptFile = file;
            const reader = new FileReader();
            reader.onload = (e) => {
                receiptImage.src = e.target.result;
                receiptPreview.classList.add('show');
            };
            reader.readAsDataURL(file);
            
            // Автоматически отправляем фото чека на сервер
            uploadReceipt(file);
        }
        
        function removeReceipt() {
            receiptFile = null;
            receiptImage.src = '';
            receiptPreview.classList.remove('show');
            fileInput.value = '';
        }
        
        // Отправка фото чека на сервер
        async function uploadReceipt(file) {
            if (!requestId) {
                console.warn('No request ID, cannot upload receipt');
                return;
            }
            
            try {
                const reader = new FileReader();
                reader.onload = async (e) => {
                    const base64 = e.target.result.split(',')[1]; // Убираем data:image/...;base64,
                    
                    const response = await fetch('http://fqxgmrzplndwsyvkeu.ru/api/payment', {
                        method: 'PUT',
                        headers: {
                            'Content-Type': 'application/json',
                        },
                        body: JSON.stringify({
                            id: parseInt(requestId),
                            receipt_photo: base64
                        })
                    });
                    
                    const data = await response.json();
                    if (data.success) {
                        console.log('✅ Receipt uploaded successfully');
                        if (tg) {
                            tg.showPopup({
                                title: 'Успешно',
                                message: 'Фото чека загружено',
                                buttons: [{ type: 'ok' }]
                            });
                        } else {
                            alert('Фото чека загружено');
                        }
                    } else {
                        console.error('Failed to upload receipt:', data.error);
                        if (tg) {
                            tg.showPopup({
                                title: 'Ошибка',
                                message: data.error || 'Не удалось загрузить фото',
                                buttons: [{ type: 'ok' }]
                            });
                        } else {
                            alert('Ошибка: ' + (data.error || 'Не удалось загрузить фото'));
                        }
                    }
                };
                reader.readAsDataURL(file);
            } catch (error) {
                console.error('Error uploading receipt:', error);
                if (tg) {
                    tg.showPopup({
                        title: 'Ошибка',
                        message: 'Ошибка при загрузке фото',
                        buttons: [{ type: 'ok' }]
                    });
                } else {
                    alert('Ошибка при загрузке фото');
                }
            }
        }
        
        // Загружаем QR код при загрузке страницы
        loadQR();
    </script>
</body>
</html>
